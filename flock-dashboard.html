<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlockWatch • Shorewood, MN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css" />
    <style>
        body { margin:0; font-family:system-ui,sans-serif; background:#f8f9fa; }
        #header { background:#fff; padding:15px 20px; border-bottom:4px solid #e63939; display:flex; justify-content:space-between; align-items:center; }
        #container { display:flex; height:calc(100vh - 68px); }
        #sidebar { width:340px; background:white; padding:20px; overflow-y:auto; box-shadow:4px 0 12px rgba(0,0,0,0.1); }
        #map { flex:1; }
        button { width:100%; padding:12px; margin:8px 0; border-radius:8px; font-size:16px; cursor:pointer; }
        button.primary { background:#e63939; color:white; border:none; font-weight:600; }
        .stat { font-size:32px; font-weight:700; color:#e63939; }
    </style>
</head>
<body>
    <div id="header">
        <h1 style="margin:0;color:#e63939;">FlockWatch</h1>
        <div>Shorewood, MN • Live ALPR</div>
    </div>
    <div id="container">
        <div id="sidebar">
            <input type="text" id="search-input" value="Shorewood, MN" style="padding:10px;">
            <button onclick="searchLocation()" class="primary">🔎 Search Area</button>
            <button onclick="loadLiveCameras()" class="primary" id="live-btn">🌐 Load Live Flock Cameras</button>
            <button onclick="showDemoCameras()">📍 Reset Demo Cameras</button>

            <div style="margin-top:25px;">
                <strong>Cameras Visible:</strong> <span id="camera-count" class="stat">7 (Demo)</span>
            </div>
            <div id="status" style="margin-top:15px; font-size:14px;"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
    <script>
        let map, markers;
        const demoCameras = [ /* same 7 cameras as before */ ];

        function initMap() {
            map = L.map('map').setView([44.905, -93.52], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers = L.markerClusterGroup();
            map.addLayer(markers);
            showDemoCameras();
        }

        function showDemoCameras() {
            markers.clearLayers();
            // Add demo cameras here (same list)
            document.getElementById('camera-count').innerHTML = '7 <span style="font-size:16px">(Demo)</span>';
            document.getElementById('status').innerHTML = '✅ Demo working';
        }

        async function loadLiveCameras() {
            const btn = document.getElementById('live-btn');
            btn.disabled = true;
            btn.textContent = "⏳ Trying multiple servers...";

            document.getElementById('status').innerHTML = "Trying to fetch live data...";

            // Try multiple Overpass mirrors
            const mirrors = [
                "https://overpass.private.coffee/api/interpreter",
                "https://overpass.kumi.systems/api/interpreter",
                "https://overpass-api.de/api/interpreter"
            ];

            for (let url of mirrors) {
                try {
                    const bounds = map.getBounds();
                    const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;
                    const query = `[out:json][timeout:15];(node["man_made"="surveillance"]["surveillance:type"="ALPR"]["manufacturer"~"Flock" i](${bbox}););out;`;

                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: `data=${encodeURIComponent(query)}`
                    });

                    if (res.ok) {
                        const data = await res.json();
                        markers.clearLayers();
                        let count = 0;
                        data.elements.forEach(el => {
                            if (el.lat && el.lon) {
                                count++;
                                L.marker([el.lat, el.lon]).bindPopup(`Flock Camera<br>ID: ${el.id}`).addTo(markers);
                            }
                        });
                        document.getElementById('camera-count').textContent = count || "0";
                        document.getElementById('status').innerHTML = `✅ Loaded ${count} live cameras from live server`;
                        btn.disabled = false;
                        btn.textContent = "🌐 Load Live Flock Cameras";
                        return;
                    }
                } catch(e) {}
            }

            document.getElementById('status').innerHTML = `❌ All mirrors failed.<br>Demo still works.`;
            btn.disabled = false;
            btn.textContent = "🌐 Load Live Flock Cameras";
        }

        async function searchLocation() {
            const q = document.getElementById('search-input').value;
            // Simple search logic
            if (q.toLowerCase().includes("shorewood")) map.flyTo([44.905, -93.52], 13);
        }

        window.onload = initMap;
    </script>
</body>
</html>
